name: ✅ CI — Lint & Type Check

    on:
    push:
      branches:
        - main
        - 'feature/**'
        - 'fix/**'
    pull_request:
      branches:
        - main

    jobs:
    check:
      name: Lint & Type Check
      runs-on: ubuntu-latest
      timeout-minutes: 10

      steps:
        - name: 📥 Checkout repo
          uses: actions/checkout@v4

        - name: 🟢 Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: 📦 Install dependencies
          run: npm ci

        - name: 🔍 Type check
          run: npm run type-check

        - name: 🧹 Lint
          run: npm run lint
    